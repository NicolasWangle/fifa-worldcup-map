        // 创建脉动效果的Canvas图形
        function createPulseCanvas(color1, color2) {
            const size = 64;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // 外圈光晕
            const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
            gradient.addColorStop(0, color1 + 'aa');
            gradient.addColorStop(0.4, color1 + '44');
            gradient.addColorStop(1, color1 + '00');

            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // 内部实心圆
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/3.5, 0, Math.PI * 2);
            ctx.fillStyle = color1;
            ctx.fill();

            // 内圈高光
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/4, 0, Math.PI * 2);
            const innerGradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/4);
            innerGradient.addColorStop(0, 'rgba(255,255,255,0.4)');
            innerGradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = innerGradient;
            ctx.fill();

            // 高光点
            ctx.beginPath();
            ctx.arc(size/2 - size/6, size/2 - size/6, size/12, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fill();

            return canvas;
        }

            document.getElementById('listTitle').textContent = '🌍 参赛国家列表';
            document.getElementById('searchInput').placeholder = '🔍 搜索国家...';

            const filterTabs = document.getElementById('filterTabs');
            filterTabs.innerHTML = `
                <div class="filter-tab active" data-filter="all">全部</div>
                <div class="filter-tab" data-filter="a">A组</div>
                <div class="filter-tab" data-filter="b">B组</div>
                <div class="filter-tab" data-filter="c">C组</div>
                <div class="filter-tab" data-filter="d">D组</div>
                <div class="filter-tab" data-filter="e">E组</div>
                <div class="filter-tab" data-filter="f">F组</div>
                <div class="filter-tab" data-filter="g">G组</div>
                <div class="filter-tab" data-filter="h">H组</div>
                <div class="filter-tab" data-filter="i">I组</div>
                <div class="filter-tab" data-filter="j">J组</div>
                <div class="filter-tab" data-filter="k">K组</div>
                <div class="filter-tab" data-filter="l">L组</div>
            `;

            currentFilter = 'all';
            addFilterTabListeners();
            generateCountryList();
            showCountryEntities();
            closeInfoPanel();
        }

        function switchToStadiums() {
            currentView = 'stadiums';
            document.getElementById('switchStadiums').classList.add('active');
            document.getElementById('switchCountries').classList.remove('active');
            document.getElementById('listTitle').textContent = '🏛️ 比赛场馆列表';
            document.getElementById('searchInput').placeholder = '🔍 搜索场馆...';

            const filterTabs = document.getElementById('filterTabs');
            filterTabs.innerHTML = `
                <div class="filter-tab active" data-filter="all">全部</div>
                <div class="filter-tab" data-filter="美国">🇺🇸 美国</div>
                <div class="filter-tab" data-filter="加拿大">🇨🇦 加拿大</div>
                <div class="filter-tab" data-filter="墨西哥">🇲🇽 墨西哥</div>
            `;

            currentFilter = 'all';
            addFilterTabListeners();
            generateStadiumList();
            showStadiumEntities();
            closeInfoPanel();

            // 自动调整视角显示所有场馆
            const rectangle = Cesium.Rectangle.fromDegrees(
                -125.0,  // 西边界
                14.5,    // 南边界
                -60.0,   // 东边界
                50.0     // 北边界
            );
            viewer.camera.flyTo({
                destination: rectangle,
                duration: 2.0,
                easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT
            });
        }

        function addFilterTabListeners() {
            const filterTabs = document.querySelectorAll('.filter-tab');
            filterTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    filterTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    document.getElementById('searchInput').value = '';
                    if (currentView === 'countries') {
                        generateCountryList();
                    } else {
                        generateStadiumList();
                    }
                });
            });
        }

        function filterItems(searchText) {
            const continentSections = document.querySelectorAll('.continent-section');
            const searchLower = searchText.toLowerCase().trim();
            
            continentSections.forEach(section => {
                const items = section.querySelectorAll('.country-item');
                let hasVisibleItem = false;
                
                items.forEach(item => {
                    const name = item.dataset.name;
                    const matches = !searchLower || name.toLowerCase().includes(searchLower);
                    
                    if (matches) {
                        item.style.display = '';
                        hasVisibleItem = true;
                        
                        if (searchLower) {
                            const nameSpan = item.querySelector('.country-name');
                            const idx = name.toLowerCase().indexOf(searchLower);
                            if (idx !== -1) {
                                const before = name.substring(0, idx);
                                const match = name.substring(idx, idx + searchLower.length);
                                const after = name.substring(idx + searchLower.length);
                                nameSpan.innerHTML = `${before}<span class="highlight-text">${match}</span>${after}`;
                            }
                        } else {
                            const nameSpan = item.querySelector('.country-name');
                            nameSpan.textContent = name;
                        }
                    } else {
                        item.style.display = 'none';
                    }
                });
                
                const itemsDiv = section.querySelector('.country-items');
                const titleDiv = section.querySelector('.continent-title');
                
                if (searchLower) {
                    if (hasVisibleItem) {
                        itemsDiv.classList.remove('collapsed');
                        titleDiv.classList.remove('collapsed');
                    }
                    section.style.display = hasVisibleItem ? '' : 'none';
                } else {
                    section.style.display = '';
                    itemsDiv.classList.remove('collapsed');
                    titleDiv.classList.remove('collapsed');
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', function() {
            filterItems(this.value);
        });
        
        // ESC键关闭图片查看
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });

        // 初始化
        initViewer();
        createCountryEntities();
        createStadiumEntities();
        showCountryEntities();
        generateCountryList();
        addFilterTabListeners();
        animatePulse();
    </script>
</body>
</html>
